<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ToDo登録確認</title>
    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
            crossorigin="anonymous">
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-6">
            <h1 class="h4 mb-4">登録内容の確認</h1>

            <div class="card shadow-sm mb-4">
                <div class="card-body">
                    <h2 class="h6 text-muted mb-2">タイトル</h2>
                    <p class="mb-0 fs-5" th:text="${title}">サンプルタスク</p>
                </div>
            </div>

            <div class="d-flex gap-2">
                <a class="btn btn-primary" th:href="@{/todo/complete}">登録</a>
                <a class="btn btn-outline-secondary" th:href="@{/todo/new}">戻る</a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
