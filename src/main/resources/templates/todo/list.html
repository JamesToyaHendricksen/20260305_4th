<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ToDo一覧</title>
    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
            crossorigin="anonymous">
</head>
<body class="bg-light">
<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h3 mb-0">ToDo一覧</h1>
        <a class="btn btn-primary" th:href="@{/todo/new}">新規登録</a>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-striped table-hover align-middle mb-0">
                    <thead class="table-dark">
                    <tr>
                        <th scope="col" style="width: 80px;">ID</th>
                        <th scope="col">タイトル</th>
                        <th scope="col" style="width: 140px;">ステータス</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:if="${#lists.isEmpty(todos)}">
                        <td colspan="3" class="text-center text-muted">ToDoがありません</td>
                    </tr>
                    <tr th:each="todo : ${todos}">
                        <td th:text="${todo.id}">1</td>
                        <td th:text="${todo.title}">サンプルタイトル</td>
                        <td>
                            <span class="badge text-bg-success" th:if="${todo.completed}">完了</span>
                            <span class="badge text-bg-secondary" th:unless="${todo.completed}">未完了</span>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
</body>
</html>
